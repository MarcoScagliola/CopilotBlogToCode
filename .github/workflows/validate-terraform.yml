name: Validate Terraform

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    environment: BLG2CODEDEV

    env:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure required environment secrets are set
        run: |
          test -n "$AZURE_TENANT_ID" || (echo "Missing secret: AZURE_TENANT_ID" && exit 1)
          test -n "$AZURE_SUBSCRIPTION_ID" || (echo "Missing secret: AZURE_SUBSCRIPTION_ID" && exit 1)

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (no backend)
        run: terraform -chdir=infra/terraform init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=infra/terraform validate
