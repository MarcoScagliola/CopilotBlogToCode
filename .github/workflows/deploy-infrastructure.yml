name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      workload:
        required: true
        default: blg
      environment:
        required: true
        default: dev
      azure_region:
        required: true
        default: uksouth
      layer_sp_mode:
        required: true
        default: create
        type: choice
        options: [create, existing]
      key_vault_recovery_mode:
        required: true
        default: auto
        type: choice
        options: [auto, recover, fresh]
      state_strategy:
        required: true
        default: fail
        type: choice
        options: [fail, recreate_rg]

env:
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID || vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID || vars.AZURE_SUBSCRIPTION_ID }}
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID || vars.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET || vars.AZURE_CLIENT_SECRET }}
  ARM_SP_OBJECT_ID: ${{ secrets.AZURE_SP_OBJECT_ID || vars.AZURE_SP_OBJECT_ID }}
  ARM_EXISTING_LAYER_SP_CLIENT_ID: ${{ secrets.EXISTING_LAYER_SP_CLIENT_ID || vars.EXISTING_LAYER_SP_CLIENT_ID || secrets.AZURE_CLIENT_ID || vars.AZURE_CLIENT_ID }}
  ARM_EXISTING_LAYER_SP_OBJECT_ID: ${{ secrets.EXISTING_LAYER_SP_OBJECT_ID || vars.EXISTING_LAYER_SP_OBJECT_ID || secrets.AZURE_SP_OBJECT_ID || vars.AZURE_SP_OBJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: BLG2CODEDEV
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Azure login
        run: |
          az login --service-principal --username "$ARM_CLIENT_ID" --password "$ARM_CLIENT_SECRET" --tenant "$ARM_TENANT_ID"
          az account set --subscription "$ARM_SUBSCRIPTION_ID"
      - name: Terraform init
        run: terraform -chdir=infra/terraform init
      - name: Terraform apply
        env:
          TF_VAR_tenant_id: ${{ env.ARM_TENANT_ID }}
          TF_VAR_subscription_id: ${{ env.ARM_SUBSCRIPTION_ID }}
          TF_VAR_client_id: ${{ env.ARM_CLIENT_ID }}
          TF_VAR_client_secret: ${{ env.ARM_CLIENT_SECRET }}
          TF_VAR_sp_object_id: ${{ env.ARM_SP_OBJECT_ID }}
          TF_VAR_workload: ${{ github.event.inputs.workload }}
          TF_VAR_environment: ${{ github.event.inputs.environment }}
          TF_VAR_azure_region: ${{ github.event.inputs.azure_region }}
          TF_VAR_layer_sp_mode: ${{ github.event.inputs.layer_sp_mode }}
          TF_VAR_existing_layer_sp_client_id: ${{ env.ARM_EXISTING_LAYER_SP_CLIENT_ID }}
          TF_VAR_existing_layer_sp_object_id: ${{ env.ARM_EXISTING_LAYER_SP_OBJECT_ID }}
        run: terraform -chdir=infra/terraform apply -auto-approve -input=false
