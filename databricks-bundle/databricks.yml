bundle:
  name: blg-medallion

include:
  - resources/*.yml

variables:
  # -------------------------------------------------------------------------
  # Required at deployment time — supplied by deploy_dab.py from TF outputs.
  # No defaults; the deploy bridge always provides these.
  # -------------------------------------------------------------------------
  workspace_host:
    description: >
      HTTPS URL of the target Databricks workspace. Supplied by the deploy
      bridge at runtime from the `databricks_workspace_url` Terraform output.
      NOT interpolated in the workspace: block — set via DATABRICKS_HOST env var.
    default: ""

  workspace_resource_id:
    description: >
      Full Azure resource ID of the Databricks workspace. Used by the Databricks
      CLI for Azure SP authentication via DATABRICKS_AZURE_RESOURCE_ID.
    default: ""

  # -------------------------------------------------------------------------
  # Unity Catalog — layer catalogs and schemas.
  # Defaults match the authoring-time names; overridden at runtime by the
  # deploy bridge if TF outputs are present.
  # -------------------------------------------------------------------------
  bronze_catalog:
    description: Unity Catalog catalog name for the Bronze layer.
    default: bronze

  silver_catalog:
    description: Unity Catalog catalog name for the Silver layer.
    default: silver

  gold_catalog:
    description: Unity Catalog catalog name for the Gold layer.
    default: gold

  bronze_schema:
    description: Unity Catalog schema name for the Bronze layer.
    default: main

  silver_schema:
    description: Unity Catalog schema name for the Silver layer.
    default: main

  gold_schema:
    description: Unity Catalog schema name for the Gold layer.
    default: main

  # -------------------------------------------------------------------------
  # Secret scope
  # -------------------------------------------------------------------------
  secret_scope:
    description: >
      Name of the AKV-backed Databricks secret scope for this environment.
      Matches the Key Vault name convention (e.g., kv-dev).
    default: kv-dev

  # -------------------------------------------------------------------------
  # Per-layer service principal client IDs.
  # Supplied by the deploy bridge from the layer_principal_client_ids TF map
  # output. Default to empty string; must be populated at runtime.
  # -------------------------------------------------------------------------
  bronze_principal_client_id:
    description: Application (client) ID of the Bronze layer service principal.
    default: ""

  silver_principal_client_id:
    description: Application (client) ID of the Silver layer service principal.
    default: ""

  gold_principal_client_id:
    description: Application (client) ID of the Gold layer service principal.
    default: ""

  # -------------------------------------------------------------------------
  # Per-layer storage account names.
  # Supplied by deploy bridge from layer_storage_account_names TF map output.
  # -------------------------------------------------------------------------
  bronze_storage_account:
    description: Storage account name for the Bronze layer.
    default: ""

  silver_storage_account:
    description: Storage account name for the Silver layer.
    default: ""

  gold_storage_account:
    description: Storage account name for the Gold layer.
    default: ""

  # -------------------------------------------------------------------------
  # Per-layer Databricks Access Connector resource IDs.
  # Supplied by deploy bridge from layer_access_connector_ids TF map output.
  # Used by the setup job to register External Locations in Unity Catalog.
  # -------------------------------------------------------------------------
  bronze_access_connector_id:
    description: Full Azure resource ID of the Bronze Databricks Access Connector.
    default: ""

  silver_access_connector_id:
    description: Full Azure resource ID of the Silver Databricks Access Connector.
    default: ""

  gold_access_connector_id:
    description: Full Azure resource ID of the Gold Databricks Access Connector.
    default: ""

targets:
  dev:
    mode: development
    default: true
    workspace:
      # workspace_host variable is NOT interpolated here — auth fields do not
      # support variable interpolation in Databricks Asset Bundles.
      # DATABRICKS_HOST is set by the deploy bridge before bundle deploy runs.
      resource_id: ${var.workspace_resource_id}

  prd:
    mode: production
    workspace:
      resource_id: ${var.workspace_resource_id}
