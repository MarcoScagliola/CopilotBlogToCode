bundle:
  name: secure_medallion_blg

include:
  - resources/*.yml

variables:
  workspace_resource_id:
    description: Azure resource ID of the Databricks workspace used by runtime setup.
  bronze_catalog:
    description: Bronze Unity Catalog name.
  silver_catalog:
    description: Silver Unity Catalog name.
  gold_catalog:
    description: Gold Unity Catalog name.
  bronze_schema:
    description: Bronze schema name.
  silver_schema:
    description: Silver schema name.
  gold_schema:
    description: Gold schema name.
  secret_scope:
    description: Databricks secret scope name backed by Azure Key Vault.
  bronze_principal_client_id:
    description: Bronze execution principal client ID.
  silver_principal_client_id:
    description: Silver execution principal client ID.
  gold_principal_client_id:
    description: Gold execution principal client ID.
  bronze_storage_account:
    description: Bronze storage account name.
  silver_storage_account:
    description: Silver storage account name.
  gold_storage_account:
    description: Gold storage account name.
  bronze_access_connector_id:
    description: Bronze access connector resource ID.
  silver_access_connector_id:
    description: Silver access connector resource ID.
  gold_access_connector_id:
    description: Gold access connector resource ID.

targets:
  dev:
    default: true
    mode: production
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
  prd:
    mode: production
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
