bundle:
  name: secure-medallion

variables:
  environment:
    description: Environment short name
    default: dev
  workspace_host:
    description: Databricks workspace URL
  workspace_resource_id:
    description: Databricks workspace Azure resource ID
  bronze_sp_client_id:
    description: Bronze layer service principal client ID
  silver_sp_client_id:
    description: Silver layer service principal client ID
  gold_sp_client_id:
    description: Gold layer service principal client ID
  bronze_catalog:
    description: Bronze catalog name
  silver_catalog:
    description: Silver catalog name
  gold_catalog:
    description: Gold catalog name
  secret_scope:
    description: Secret scope name

include:
  - resources/jobs.yml

targets:
  dev:
    mode: development
    workspace:
      host: ${var.workspace_host}
      azure_workspace_resource_id: ${var.workspace_resource_id}
    variables:
      environment: dev

  prd:
    mode: production
    workspace:
      host: ${var.workspace_host}
      azure_workspace_resource_id: ${var.workspace_resource_id}
    variables:
      environment: prd
