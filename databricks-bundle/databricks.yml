bundle:
  name: secure-medallion-dab
  target: default

targets:
  dev:
    variables:
      environment: dev
      catalog_name: dev_catalog
      secret_scope: kv-dev-scope

  prd:
    variables:
      environment: prd
      catalog_name: prd_catalog
      secret_scope: kv-prd-scope

variables:
  workspace_host:
    description: Databricks workspace URL from Terraform output
    default: ""

  workspace_resource_id:
    description: Databricks workspace Azure resource ID for DAB CLI authentication
    default: ""

  bronze_principal_client_id:
    description: Bronze layer service principal client ID
    default: ""

  silver_principal_client_id:
    description: Silver layer service principal client ID
    default: ""

  gold_principal_client_id:
    description: Gold layer service principal client ID
    default: ""

  bronze_storage_account:
    description: Bronze storage account name
    default: ""

  silver_storage_account:
    description: Silver storage account name
    default: ""

  gold_storage_account:
    description: Gold storage account name
    default: ""

  environment:
    description: Environment name (dev, prd)
    default: dev

  catalog_name:
    description: Unity Catalog name for this environment
    default: dev_catalog

  secret_scope:
    description: Key Vault-backed secret scope name
    default: kv-dev-scope
