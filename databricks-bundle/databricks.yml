bundle:
  name: medallion-${var.workload}-${var.environment}

variables:
  workload:
    description: "Short workload identifier (e.g. blg)"
  environment:
    description: "Deployment environment (dev / prd)"
  workspace_host:
    description: "Databricks workspace URL"
  workspace_resource_id:
    description: "Azure resource ID for the Databricks workspace (used for AKV-backed secret scope)"

  # Layer catalogs
  bronze_catalog_name:
    description: "Unity Catalog catalog name for the bronze layer"
  silver_catalog_name:
    description: "Unity Catalog catalog name for the silver layer"
  gold_catalog_name:
    description: "Unity Catalog catalog name for the gold layer"

  # Layer schemas
  bronze_schema_name:
    description: "Unity Catalog schema name for the bronze layer"
    default: "ingestion"
  silver_schema_name:
    description: "Unity Catalog schema name for the silver layer"
    default: "refined"
  gold_schema_name:
    description: "Unity Catalog schema name for the gold layer"
    default: "curated"

  # Layer storage accounts
  bronze_storage_account_name:
    description: "Storage account name for the bronze layer"
  silver_storage_account_name:
    description: "Storage account name for the silver layer"
  gold_storage_account_name:
    description: "Storage account name for the gold layer"

  # Layer Access Connector resource IDs
  bronze_access_connector_id:
    description: "Azure resource ID for the bronze Access Connector"
  silver_access_connector_id:
    description: "Azure resource ID for the silver Access Connector"
  gold_access_connector_id:
    description: "Azure resource ID for the gold Access Connector"

  # Secret scope
  secret_scope_name:
    description: "Databricks secret scope name backed by Key Vault"

workspace:
  host: ${var.workspace_host}

resources:
  jobs: ../databricks-bundle/resources/jobs.yml

targets:
  dev:
    mode: development
    workspace:
      host: ${var.workspace_host}
    variables:
      environment: dev

  prd:
    mode: production
    workspace:
      host: ${var.workspace_host}
    variables:
      environment: prd
bundle:
  name: secure-medallion-${bundle.target}

include:
  - resources/*.yml

variables:
  workspace_host:
    description: Databricks workspace host URL from Terraform output.
  workspace_resource_id:
    description: Databricks workspace Azure resource ID from Terraform output.
  bronze_catalog:
    description: Bronze Unity Catalog name.
    default: dev_bronze
  silver_catalog:
    description: Silver Unity Catalog name.
    default: dev_silver
  gold_catalog:
    description: Gold Unity Catalog name.
    default: dev_gold
  bronze_schema:
    description: Bronze schema name.
    default: ingestion
  silver_schema:
    description: Silver schema name.
    default: refined
  gold_schema:
    description: Gold schema name.
    default: curated
  secret_scope:
    description: Secret scope for runtime credentials.
    default: kv-dev-scope
  bronze_principal_client_id:
    description: Bronze layer principal client ID.
    default: ""
  silver_principal_client_id:
    description: Silver layer principal client ID.
    default: ""
  gold_principal_client_id:
    description: Gold layer principal client ID.
    default: ""
  bronze_storage_account:
    description: Bronze storage account name.
    default: ""
  silver_storage_account:
    description: Silver storage account name.
    default: ""
  gold_storage_account:
    description: Gold storage account name.
    default: ""
  bronze_access_connector_id:
    description: Azure resource ID for Bronze Databricks Access Connector.
    default: ""
  silver_access_connector_id:
    description: Azure resource ID for Silver Databricks Access Connector.
    default: ""
  gold_access_connector_id:
    description: Azure resource ID for Gold Databricks Access Connector.
    default: ""

targets:
  dev:
    mode: development
    default: true
    variables:
      bronze_catalog: dev_bronze
      silver_catalog: dev_silver
      gold_catalog: dev_gold
      secret_scope: kv-dev-scope

  prd:
    mode: production
    variables:
      bronze_catalog: prd_bronze
      silver_catalog: prd_silver
      gold_catalog: prd_gold
      secret_scope: kv-prd-scope
