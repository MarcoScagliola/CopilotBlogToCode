bundle:
  name: secure-medallion-${var.workload}-${var.environment}

variables:
  workload:
    default: blg
  environment:
    default: dev

  workspace_host:
    description: Databricks workspace URL from Terraform output.
    default: ""

  workspace_resource_id:
    description: Databricks workspace Azure resource ID from Terraform output.
    default: ""

  bronze_sp_client_id:
    default: ""
  silver_sp_client_id:
    default: ""
  gold_sp_client_id:
    default: ""

  bronze_catalog:
    default: ""
  silver_catalog:
    default: ""
  gold_catalog:
    default: ""

  bronze_schema:
    default: default
  silver_schema:
    default: default
  gold_schema:
    default: default

  secret_scope:
    description: AKV-backed Databricks secret scope.
    default: ""

  alert_email:
    default: ""

workspace:
  host: ${var.workspace_host}
  azure_workspace_resource_id: ${var.workspace_resource_id}

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true
  prd:
    mode: production
