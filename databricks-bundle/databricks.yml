bundle:
  name: medallion-bundle

include:
  - resources/*.yml

variables:
  bronze_catalog:
    description: Unity Catalog catalog name for the Bronze layer.
  silver_catalog:
    description: Unity Catalog catalog name for the Silver layer.
  gold_catalog:
    description: Unity Catalog catalog name for the Gold layer.

  bronze_schema:
    description: Unity Catalog schema for the Bronze layer.
    default: medallion
  silver_schema:
    description: Unity Catalog schema for the Silver layer.
    default: medallion
  gold_schema:
    description: Unity Catalog schema for the Gold layer.
    default: medallion

  bronze_storage_account:
    description: ADLS Gen2 storage account name for Bronze.
  silver_storage_account:
    description: ADLS Gen2 storage account name for Silver.
  gold_storage_account:
    description: ADLS Gen2 storage account name for Gold.

  bronze_access_connector_id:
    description: Resource ID of the Bronze Databricks Access Connector.
  silver_access_connector_id:
    description: Resource ID of the Silver Databricks Access Connector.
  gold_access_connector_id:
    description: Resource ID of the Gold Databricks Access Connector.

  secret_scope:
    description: AKV-backed Databricks secret scope used at runtime.

  workspace_host:
    description: Workspace host bridged by deploy_dab.py; not used in auth-field interpolation.
  workspace_resource_id:
    description: Workspace Azure resource ID bridged by deploy_dab.py.

targets:
  dev:
    mode: development
    default: true
  prd:
    mode: production
