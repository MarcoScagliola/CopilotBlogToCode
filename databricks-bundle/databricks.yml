bundle:
  name: medallion-${var.environment}

variables:
  environment:
    description: Environment name
    default: dev
  workspace_url:
    description: Databricks workspace URL from Terraform output
    default: "<TODO_WORKSPACE_URL>"
  secret_scope:
    description: Secret scope name
    default: "blg-dev-scope"

  bronze_catalog:
    default: "<TODO_BRONZE_CATALOG>"
  bronze_schema:
    default: "<TODO_BRONZE_SCHEMA>"
  bronze_sp_client_id:
    default: "<TODO_BRONZE_SP_CLIENT_ID>"
  bronze_job_cron:
    default: "<TODO_BRONZE_JOB_CRON>"
  bronze_alert_email:
    default: "<TODO_BRONZE_JOB_ALERT_EMAIL>"

  silver_catalog:
    default: "<TODO_SILVER_CATALOG>"
  silver_schema:
    default: "<TODO_SILVER_SCHEMA>"
  silver_sp_client_id:
    default: "<TODO_SILVER_SP_CLIENT_ID>"
  silver_job_cron:
    default: "<TODO_SILVER_JOB_CRON>"
  silver_alert_email:
    default: "<TODO_SILVER_JOB_ALERT_EMAIL>"

  gold_catalog:
    default: "<TODO_GOLD_CATALOG>"
  gold_schema:
    default: "<TODO_GOLD_SCHEMA>"
  gold_sp_client_id:
    default: "<TODO_GOLD_SP_CLIENT_ID>"
  gold_job_cron:
    default: "<TODO_GOLD_JOB_CRON>"
  gold_alert_email:
    default: "<TODO_GOLD_JOB_ALERT_EMAIL>"

  orchestrator_job_cron:
    default: "<TODO_ORCHESTRATOR_JOB_CRON>"
  orchestrator_alert_email:
    default: "<TODO_ORCHESTRATOR_JOB_ALERT_EMAIL>"

include:
  - resources/jobs.yml
