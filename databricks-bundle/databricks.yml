bundle:
  name: blg-medallion

include:
  - resources/*.yml

variables:
  workspace_resource_id:
    default: ""
  bronze_catalog:
    default: bronze
  silver_catalog:
    default: silver
  gold_catalog:
    default: gold
  bronze_schema:
    default: main
  silver_schema:
    default: main
  gold_schema:
    default: main
  secret_scope:
    default: kv-dev-scope
  bronze_principal_client_id:
    default: ""
  silver_principal_client_id:
    default: ""
  gold_principal_client_id:
    default: ""
  bronze_storage_account:
    default: ""
  silver_storage_account:
    default: ""
  gold_storage_account:
    default: ""
  bronze_access_connector_id:
    default: ""
  silver_access_connector_id:
    default: ""
  gold_access_connector_id:
    default: ""

targets:
  dev:
    mode: development
    default: true
  prd:
    mode: production
