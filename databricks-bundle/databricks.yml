bundle:
  name: secure-medallion-blg

include:
  - resources/*.yml

variables:
  workspace_resource_id:
    description: Azure resource ID of the Databricks workspace.
  bronze_catalog:
    description: Unity Catalog catalog for bronze.
  silver_catalog:
    description: Unity Catalog catalog for silver.
  gold_catalog:
    description: Unity Catalog catalog for gold.
  bronze_schema:
    description: Unity Catalog schema for bronze.
  silver_schema:
    description: Unity Catalog schema for silver.
  gold_schema:
    description: Unity Catalog schema for gold.
  secret_scope:
    description: Databricks secret scope name.
  bronze_principal_client_id:
    description: Bronze layer service principal client ID.
  silver_principal_client_id:
    description: Silver layer service principal client ID.
  gold_principal_client_id:
    description: Gold layer service principal client ID.
  bronze_storage_account:
    description: Bronze storage account name.
  silver_storage_account:
    description: Silver storage account name.
  gold_storage_account:
    description: Gold storage account name.
  bronze_access_connector_id:
    description: Bronze access connector ID.
  silver_access_connector_id:
    description: Silver access connector ID.
  gold_access_connector_id:
    description: Gold access connector ID.

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://adb-placeholder-dev.azuredatabricks.net

  prd:
    mode: production
    workspace:
      host: https://adb-placeholder-prd.azuredatabricks.net
