bundle:
  name: secure-medallion-blg

include:
  - resources/*.yml

variables:
  workspace_host:
  workspace_resource_id:
  bronze_catalog:
  silver_catalog:
  gold_catalog:
  secret_scope:
  bronze_principal_client_id:
  silver_principal_client_id:
  gold_principal_client_id:
  bronze_storage_account:
  silver_storage_account:
  gold_storage_account:
  bronze_access_connector_id:
  silver_access_connector_id:
  gold_access_connector_id:
  bronze_schema:
    default: bronze
  silver_schema:
    default: silver
  gold_schema:
    default: gold

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: ${var.workspace_host}
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}

  prd:
    mode: production
    workspace:
      host: ${var.workspace_host}
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
