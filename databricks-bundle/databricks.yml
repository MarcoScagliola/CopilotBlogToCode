bundle:
  name: secure-medallion-pattern

include:
  - resources/*.yml

variables:
  databricks_workspace_url:
    description: Databricks workspace URL.
  databricks_workspace_resource_id:
    description: Azure resource ID for Databricks workspace.
  secret_scope_name:
    description: Databricks secret scope name.
  bronze_catalog_name:
    description: Bronze catalog name.
    default: etl_bronze
  silver_catalog_name:
    description: Silver catalog name.
    default: etl_silver
  gold_catalog_name:
    description: Gold catalog name.
    default: etl_gold
  bronze_schema_name:
    description: Bronze schema name.
    default: core
  silver_schema_name:
    description: Silver schema name.
    default: core
  gold_schema_name:
    description: Gold schema name.
    default: core
  bronze_storage_account_name:
    description: Bronze storage account name.
  silver_storage_account_name:
    description: Silver storage account name.
  gold_storage_account_name:
    description: Gold storage account name.
  bronze_access_connector_id:
    description: Bronze access connector ID.
  silver_access_connector_id:
    description: Silver access connector ID.
  gold_access_connector_id:
    description: Gold access connector ID.
  bronze_principal_client_id:
    description: Bronze layer principal client ID.
  silver_principal_client_id:
    description: Silver layer principal client ID.
  gold_principal_client_id:
    description: Gold layer principal client ID.

targets:
  dev:
    mode: development
    default: true

  prd:
    mode: production
