bundle:
  name: medallion-blg
  description: Secure Medallion Architecture data pipeline (Bronze → Silver → Gold)

targets:
  dev:
    mode: development
    workspace:
      host: "{{workspace_host}}"
      root_path: /Workspace/Users/{{user_name}}/medallion-blg
  prod:
    mode: production
    workspace:
      host: "{{workspace_host}}"
      root_path: /Users/medallion-blg

variables:
  workspace_host:
    description: "Databricks workspace URL (from Terraform output)"
    default: "https://PLACEHOLDER.cloud.databricks.com"
  
  bronze_catalog:
    description: "Bronze UC catalog name"
    default: "blg_bronze"
  
  bronze_schema:
    description: "Bronze UC schema name"
    default: "raw_data"
  
  silver_catalog:
    description: "Silver UC catalog name"
    default: "blg_silver"
  
  silver_schema:
    description: "Silver UC schema name"
    default: "curated_data"
  
  gold_catalog:
    description: "Gold UC catalog name"
    default: "blg_gold"
  
  gold_schema:
    description: "Gold UC schema name"
    default: "analytics"
  
  bronze_sp_client_id:
    description: "Service principal client ID for Bronze layer"
    default: "PLACEHOLDER_BRONZE_SP"
  
  silver_sp_client_id:
    description: "Service principal client ID for Silver layer"
    default: "PLACEHOLDER_SILVER_SP"
  
  gold_sp_client_id:
    description: "Service principal client ID for Gold layer"
    default: "PLACEHOLDER_GOLD_SP"
  
  secret_scope:
    description: "Databricks AKV-backed secret scope name"
    default: "blg-dev-uks-akv"
  
  source_table_name:
    description: "Source JDBC table name (e.g., sales_transactions)"
    default: "TODO_SOURCE_TABLE"
  
  alert_email:
    description: "Email for job failure alerts"
    default: "TODO_ALERT_EMAIL"

resources:
  jobs:
    source: resources/jobs.yml
