bundle:
  name: secure-medallion-blg

include:
  - resources/jobs.yml

variables:
  workload:
    description: Workload short name
    default: blg
  environment:
    description: Deployment environment
    default: dev
  workspace_host:
    description: Databricks workspace host URL from Terraform output databricks_workspace_url
  secret_scope:
    description: Databricks AKV-backed secret scope name
  bronze_catalog:
    description: Bronze catalog name
  silver_catalog:
    description: Silver catalog name
  gold_catalog:
    description: Gold catalog name
  bronze_schema:
    default: bronze_schema
  silver_schema:
    default: silver_schema
  gold_schema:
    default: gold_schema
  bronze_sp_application_id:
    description: Bronze layer service principal application ID
  silver_sp_application_id:
    description: Silver layer service principal application ID
  gold_sp_application_id:
    description: Gold layer service principal application ID
  source_table_name:
    description: Source table read by Bronze pipeline over JDBC
    default: source_table
  bronze_table_name:
    default: bronze_events
  silver_table_name:
    default: silver_events
  gold_table_name:
    default: gold_daily_metrics

targets:
  dev:
    default: true
    workspace:
      host: ${var.workspace_host}
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}