bundle:
  name: secure-medallion-blg

include:
  - resources/*.yml

variables:
  workspace_resource_id:
    description: Azure resource ID of the Databricks workspace.
  bronze_catalog:
    description: Bronze Unity Catalog name.
  silver_catalog:
    description: Silver Unity Catalog name.
  gold_catalog:
    description: Gold Unity Catalog name.
  bronze_schema:
    description: Bronze schema name.
  silver_schema:
    description: Silver schema name.
  gold_schema:
    description: Gold schema name.
  secret_scope:
    description: AKV-backed Databricks secret scope name.
  bronze_principal_client_id:
    description: Application (client) ID of the bronze Service Principal.
  silver_principal_client_id:
    description: Application (client) ID of the silver Service Principal.
  gold_principal_client_id:
    description: Application (client) ID of the gold Service Principal.
  bronze_storage_account:
    description: Bronze ADLS Gen2 storage account name.
  silver_storage_account:
    description: Silver ADLS Gen2 storage account name.
  gold_storage_account:
    description: Gold ADLS Gen2 storage account name.
  bronze_access_connector_id:
    description: Azure resource ID of the bronze Databricks Access Connector.
  silver_access_connector_id:
    description: Azure resource ID of the silver Databricks Access Connector.
  gold_access_connector_id:
    description: Azure resource ID of the gold Databricks Access Connector.

targets:
  dev:
    default: true
    mode: production
  prd:
    mode: production