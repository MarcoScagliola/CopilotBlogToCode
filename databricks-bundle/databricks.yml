bundle:
  name: secure-medallion

# ── Workspace connection ──────────────────────────────────────────────────────
# Set the actual workspace URL after Terraform apply.
# Use Terraform output: databricks_workspace_url
workspace:
  host: <TODO_DATABRICKS_WORKSPACE_URL>

# ── Bundle-level variables ────────────────────────────────────────────────────
variables:
  environment:
    description: "Deployment environment label (dev, test, prod)."
    default: prod

  secret_scope:
    description: "AKV-backed Databricks secret scope name — must match Terraform var.secret_scope_name."
    default: akv-scope

  # Unity Catalog names — copy from Terraform output: unity_catalog_names
  bronze_catalog:
    description: "Unity Catalog name for the Bronze layer."
    default: <TODO_BRONZE_CATALOG_NAME>

  silver_catalog:
    description: "Unity Catalog name for the Silver layer."
    default: <TODO_SILVER_CATALOG_NAME>

  gold_catalog:
    description: "Unity Catalog name for the Gold layer."
    default: <TODO_GOLD_CATALOG_NAME>

  # Service principal client IDs — copy from Terraform output: service_principal_client_ids
  bronze_sp_client_id:
    description: "Bronze SP application (client) ID from Entra ID."
    default: <TODO_BRONZE_SP_CLIENT_ID>

  silver_sp_client_id:
    description: "Silver SP application (client) ID from Entra ID."
    default: <TODO_SILVER_SP_CLIENT_ID>

  gold_sp_client_id:
    description: "Gold SP application (client) ID from Entra ID."
    default: <TODO_GOLD_SP_CLIENT_ID>

  alert_email:
    description: "Email address for job failure notifications."
    default: <TODO_ALERT_EMAIL>

# ── Resource includes ─────────────────────────────────────────────────────────
include:
  - resources/jobs.yml

# ── Deployment targets ────────────────────────────────────────────────────────
targets:
  prod:
    mode: production
    default: true
    workspace:
      host: <TODO_DATABRICKS_WORKSPACE_URL>
