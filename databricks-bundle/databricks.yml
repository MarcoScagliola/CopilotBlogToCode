bundle:
  name: blg-secure-medallion

variables:
  workspace_host:
    description: "Databricks workspace URL (output from Terraform: databricks_workspace_url)"
  bronze_catalog:
    description: "Unity Catalog name for the Bronze layer (Terraform output: bronze_catalog_name)"
  silver_catalog:
    description: "Unity Catalog name for the Silver layer (Terraform output: silver_catalog_name)"
  gold_catalog:
    description: "Unity Catalog name for the Gold layer (Terraform output: gold_catalog_name)"
  bronze_schema:
    description: "Schema name in the Bronze catalog (Terraform output: bronze_schema_name)"
  silver_schema:
    description: "Schema name in the Silver catalog (Terraform output: silver_schema_name)"
  gold_schema:
    description: "Schema name in the Gold catalog (Terraform output: gold_schema_name)"
  bronze_sp_app_id:
    description: "Entra Application ID for Bronze SP (Terraform output: bronze_sp_application_id)"
  silver_sp_app_id:
    description: "Entra Application ID for Silver SP (Terraform output: silver_sp_application_id)"
  gold_sp_app_id:
    description: "Entra Application ID for Gold SP (Terraform output: gold_sp_application_id)"
  secret_scope:
    description: "Databricks secret scope name backed by Key Vault (Terraform output: secret_scope_name)"
  source_table_name:
    description: "Source table name to ingest (e.g. orders, customers). Set before first deploy."
  alert_email:
    description: "Email address for job failure notifications."

targets:
  dev:
    mode: development
    workspace:
      host: ${var.workspace_host}
    variables:
      bronze_catalog: ${var.bronze_catalog}
      silver_catalog: ${var.silver_catalog}
      gold_catalog: ${var.gold_catalog}
      bronze_schema: ${var.bronze_schema}
      silver_schema: ${var.silver_schema}
      gold_schema: ${var.gold_schema}
      bronze_sp_app_id: ${var.bronze_sp_app_id}
      silver_sp_app_id: ${var.silver_sp_app_id}
      gold_sp_app_id: ${var.gold_sp_app_id}
      secret_scope: ${var.secret_scope}

  prd:
    workspace:
      host: ${var.workspace_host}
    variables:
      bronze_catalog: ${var.bronze_catalog}
      silver_catalog: ${var.silver_catalog}
      gold_catalog: ${var.gold_catalog}
      bronze_schema: ${var.bronze_schema}
      silver_schema: ${var.silver_schema}
      gold_schema: ${var.gold_schema}
      bronze_sp_app_id: ${var.bronze_sp_app_id}
      silver_sp_app_id: ${var.silver_sp_app_id}
      gold_sp_app_id: ${var.gold_sp_app_id}
      secret_scope: ${var.secret_scope}

resources:
  jobs:
    - ./resources/jobs.yml
