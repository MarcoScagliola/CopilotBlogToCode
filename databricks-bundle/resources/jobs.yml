resources:
  jobs:

    # ── Bronze: raw ingestion ─────────────────────────────────────────────────
    bronze_job:
      name: "job-medallion-bronze-${var.environment}"

      run_as:
        service_principal_name: ${var.bronze_sp_client_id}

      job_clusters:
        - job_cluster_key: bronze-cluster
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 2
            spark_env_vars:
              DATABRICKS_RUNTIME_ENV: "${var.environment}"
            custom_tags:
              layer: bronze
              environment: "${var.environment}"

      tasks:
        - task_key: ingest-bronze
          job_cluster_key: bronze-cluster
          spark_python_task:
            python_file: ./src/bronze/main.py
            parameters:
              - "--secret-scope"
              - "${var.secret_scope}"
              - "--catalog"
              - "${var.bronze_catalog}"
              - "--env"
              - "${var.environment}"

      email_notifications:
        on_failure:
          - ${var.alert_email}

      # TODO: set schedule — example: daily at 02:00 UTC
      # schedule:
      #   quartz_cron_expression: "0 0 2 * * ?"
      #   timezone_id: "UTC"

    # ── Silver: cleanse and enrich ────────────────────────────────────────────
    silver_job:
      name: "job-medallion-silver-${var.environment}"

      run_as:
        service_principal_name: ${var.silver_sp_client_id}

      job_clusters:
        - job_cluster_key: silver-cluster
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 2
            spark_env_vars:
              DATABRICKS_RUNTIME_ENV: "${var.environment}"
            custom_tags:
              layer: silver
              environment: "${var.environment}"

      tasks:
        - task_key: transform-silver
          job_cluster_key: silver-cluster
          spark_python_task:
            python_file: ./src/silver/main.py
            parameters:
              - "--secret-scope"
              - "${var.secret_scope}"
              - "--source-catalog"
              - "${var.bronze_catalog}"
              - "--target-catalog"
              - "${var.silver_catalog}"
              - "--env"
              - "${var.environment}"

      email_notifications:
        on_failure:
          - ${var.alert_email}

    # ── Gold: aggregate and serve ─────────────────────────────────────────────
    gold_job:
      name: "job-medallion-gold-${var.environment}"

      run_as:
        service_principal_name: ${var.gold_sp_client_id}

      job_clusters:
        - job_cluster_key: gold-cluster
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 2
            spark_env_vars:
              DATABRICKS_RUNTIME_ENV: "${var.environment}"
            custom_tags:
              layer: gold
              environment: "${var.environment}"

      tasks:
        - task_key: aggregate-gold
          job_cluster_key: gold-cluster
          spark_python_task:
            python_file: ./src/gold/main.py
            parameters:
              - "--secret-scope"
              - "${var.secret_scope}"
              - "--source-catalog"
              - "${var.silver_catalog}"
              - "--target-catalog"
              - "${var.gold_catalog}"
              - "--env"
              - "${var.environment}"

      email_notifications:
        on_failure:
          - ${var.alert_email}

    # ── Orchestrator: chains Bronze → Silver → Gold ───────────────────────────
    orchestrator_job:
      name: "job-medallion-orchestrator-${var.environment}"

      # TODO: set schedule — example: daily at 01:00 UTC (must finish before downstream jobs)
      # schedule:
      #   quartz_cron_expression: "0 0 1 * * ?"
      #   timezone_id: "UTC"

      email_notifications:
        on_failure:
          - ${var.alert_email}

      tasks:
        - task_key: trigger-bronze
          run_job_task:
            job_id: ${resources.jobs.bronze_job.id}

        - task_key: trigger-silver
          depends_on:
            - task_key: trigger-bronze
          run_job_task:
            job_id: ${resources.jobs.silver_job.id}

        - task_key: trigger-gold
          depends_on:
            - task_key: trigger-silver
          run_job_task:
            job_id: ${resources.jobs.gold_job.id}
