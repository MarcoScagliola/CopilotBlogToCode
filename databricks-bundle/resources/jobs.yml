resources:
  jobs:
    bronze_job:
      name: bronze-ingestion-${var.environment}
      clusters:
        - job_cluster_key: bronze_cluster
      tasks:
        - task_key: ingest
          job_cluster_key: bronze_cluster
          spark_python_task:
            python_file: src/bronze/main.py
            parameters:
              - --catalog=${var.catalog_name}
              - --schema=ingestion
              - --storage-account=${var.bronze_storage_account}

    silver_job:
      name: silver-transform-${var.environment}
      clusters:
        - job_cluster_key: silver_cluster
      tasks:
        - task_key: transform
          job_cluster_key: silver_cluster
          spark_python_task:
            python_file: src/silver/main.py
            parameters:
              - --catalog=${var.catalog_name}
              - --source-schema=ingestion
              - --target-schema=refined
              - --storage-account=${var.silver_storage_account}
      depends_on:
        - job_key: bronze_job

    gold_job:
      name: gold-aggregate-${var.environment}
      clusters:
        - job_cluster_key: gold_cluster
      tasks:
        - task_key: aggregate
          job_cluster_key: gold_cluster
          spark_python_task:
            python_file: src/gold/main.py
            parameters:
              - --catalog=${var.catalog_name}
              - --source-schema=refined
              - --target-schema=curated
              - --storage-account=${var.gold_storage_account}
      depends_on:
        - job_key: silver_job

    orchestrator_job:
      name: medallion-orchestrator-${var.environment}
      tasks:
        - task_key: run_bronze
          run_job_task:
            job_id: ${resources.jobs.bronze_job.id}
        - task_key: run_silver
          run_job_task:
            job_id: ${resources.jobs.silver_job.id}
          depends_on:
            - task_key: run_bronze
        - task_key: run_gold
          run_job_task:
            job_id: ${resources.jobs.gold_job.id}
          depends_on:
            - task_key: run_silver
