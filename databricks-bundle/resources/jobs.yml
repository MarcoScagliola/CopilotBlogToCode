resources:
  jobs:
    bronze_layer:
      name: job-blg-brz-${var.environment}
      run_as:
        service_principal_name: ${var.bronze_sp_client_id}
      email_notifications:
        on_failure:
          - ${var.alert_email}
      job_clusters:
        - job_cluster_key: bronze_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_DS3_v2
            driver_node_type_id: Standard_DS3_v2
            runtime_engine: STANDARD
            autoscale:
              min_workers: 1
              max_workers: 2
            custom_tags:
              environment: ${var.environment}
              layer: bronze
              workload: blg
      tasks:
        - task_key: bronze_ingest
          job_cluster_key: bronze_cluster
          spark_python_task:
            python_file: ../src/bronze/main.py
            parameters:
              - --catalog
              - ${var.bronze_catalog}
              - --schema
              - ${var.bronze_schema}
              - --table
              - ${var.bronze_table}
              - --secret-scope
              - ${var.secret_scope}
              - --jdbc-host-key
              - ${var.jdbc_host_key}
              - --jdbc-database-key
              - ${var.jdbc_database_key}
              - --jdbc-user-key
              - ${var.jdbc_user_key}
              - --jdbc-password-key
              - ${var.jdbc_password_key}
              - --source-query
              - ${var.bronze_source_query}

    silver_layer:
      name: job-blg-slv-${var.environment}
      run_as:
        service_principal_name: ${var.silver_sp_client_id}
      email_notifications:
        on_failure:
          - ${var.alert_email}
      job_clusters:
        - job_cluster_key: silver_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_DS3_v2
            driver_node_type_id: Standard_DS3_v2
            runtime_engine: PHOTON
            autoscale:
              min_workers: 1
              max_workers: 3
            custom_tags:
              environment: ${var.environment}
              layer: silver
              workload: blg
      tasks:
        - task_key: silver_refine
          job_cluster_key: silver_cluster
          spark_python_task:
            python_file: ../src/silver/main.py
            parameters:
              - --input-catalog
              - ${var.bronze_catalog}
              - --input-schema
              - ${var.bronze_schema}
              - --input-table
              - ${var.bronze_table}
              - --output-catalog
              - ${var.silver_catalog}
              - --output-schema
              - ${var.silver_schema}
              - --output-table
              - ${var.silver_table}

    gold_layer:
      name: job-blg-gld-${var.environment}
      run_as:
        service_principal_name: ${var.gold_sp_client_id}
      email_notifications:
        on_failure:
          - ${var.alert_email}
      job_clusters:
        - job_cluster_key: gold_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_DS3_v2
            driver_node_type_id: Standard_DS3_v2
            runtime_engine: STANDARD
            autoscale:
              min_workers: 1
              max_workers: 2
            custom_tags:
              environment: ${var.environment}
              layer: gold
              workload: blg
      tasks:
        - task_key: gold_curate
          job_cluster_key: gold_cluster
          spark_python_task:
            python_file: ../src/gold/main.py
            parameters:
              - --input-catalog
              - ${var.silver_catalog}
              - --input-schema
              - ${var.silver_schema}
              - --input-table
              - ${var.silver_table}
              - --output-catalog
              - ${var.gold_catalog}
              - --output-schema
              - ${var.gold_schema}
              - --output-table
              - ${var.gold_table}

    medallion_orchestrator:
      name: job-blg-orch-${var.environment}
      schedule:
        quartz_cron_expression: ${var.orchestrator_cron}
        timezone_id: UTC
        pause_status: UNPAUSED
      email_notifications:
        on_failure:
          - ${var.alert_email}
      tasks:
        - task_key: run_bronze
          run_job_task:
            job_id: ${resources.jobs.bronze_layer.id}
        - task_key: run_silver
          depends_on:
            - task_key: run_bronze
          run_job_task:
            job_id: ${resources.jobs.silver_layer.id}
        - task_key: run_gold
          depends_on:
            - task_key: run_silver
          run_job_task:
            job_id: ${resources.jobs.gold_layer.id}