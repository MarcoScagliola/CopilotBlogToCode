resources:
  jobs:
    bronze_layer:
      name: medallion-bronze-${var.workload}-${var.environment}
      job_clusters:
        - job_cluster_key: bronze_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_DS3_v2
            autoscale:
              min_workers: 1
              max_workers: 2
            runtime_engine: STANDARD
      tasks:
        - task_key: ingest
          job_cluster_key: bronze_cluster
          spark_python_task:
            python_file: ../src/bronze/main.py
            parameters:
              - --catalog
              - ${var.bronze_catalog}
              - --schema
              - ${var.bronze_schema}
              - --secret-scope
              - ${var.secret_scope}
      run_as:
        service_principal_name: ${var.bronze_sp_client_id}

    silver_layer:
      name: medallion-silver-${var.workload}-${var.environment}
      job_clusters:
        - job_cluster_key: silver_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_DS3_v2
            autoscale:
              min_workers: 1
              max_workers: 3
            runtime_engine: PHOTON
      tasks:
        - task_key: refine
          job_cluster_key: silver_cluster
          spark_python_task:
            python_file: ../src/silver/main.py
            parameters:
              - --bronze-catalog
              - ${var.bronze_catalog}
              - --bronze-schema
              - ${var.bronze_schema}
              - --silver-catalog
              - ${var.silver_catalog}
              - --silver-schema
              - ${var.silver_schema}
      run_as:
        service_principal_name: ${var.silver_sp_client_id}

    gold_layer:
      name: medallion-gold-${var.workload}-${var.environment}
      job_clusters:
        - job_cluster_key: gold_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_DS3_v2
            autoscale:
              min_workers: 1
              max_workers: 2
            runtime_engine: STANDARD
      tasks:
        - task_key: curate
          job_cluster_key: gold_cluster
          spark_python_task:
            python_file: ../src/gold/main.py
            parameters:
              - --silver-catalog
              - ${var.silver_catalog}
              - --silver-schema
              - ${var.silver_schema}
              - --gold-catalog
              - ${var.gold_catalog}
              - --gold-schema
              - ${var.gold_schema}
      run_as:
        service_principal_name: ${var.gold_sp_client_id}

    medallion_orchestrator:
      name: medallion-orchestrator-${var.workload}-${var.environment}
      schedule:
        quartz_cron_expression: 0 0 2 * * ?
        timezone_id: UTC
        pause_status: UNPAUSED
      tasks:
        - task_key: run_bronze
          run_job_task:
            job_id: ${resources.jobs.bronze_layer.id}
        - task_key: run_silver
          depends_on:
            - task_key: run_bronze
          run_job_task:
            job_id: ${resources.jobs.silver_layer.id}
        - task_key: run_gold
          depends_on:
            - task_key: run_silver
          run_job_task:
            job_id: ${resources.jobs.gold_layer.id}
      email_notifications:
        on_failure:
          - ${var.alert_email}
