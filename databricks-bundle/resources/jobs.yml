resources:
  jobs:
    bronze_job:
      name: "${var.environment}-bronze-job"
      run_as:
        service_principal_name: ${var.bronze_service_principal_application_id}
      email_notifications:
        on_failure:
          - ${var.notification_email}
      tasks:
        - task_key: bronze_task
          spark_python_task:
            python_file: ../src/main.py
            parameters:
              - --layer
              - bronze
              - --catalog
              - ${var.bronze_catalog}
              - --schema
              - ${var.bronze_schema}
              - --secret-scope
              - ${var.secret_scope_name}
          new_cluster:
            spark_version: ${var.bronze_runtime}
            node_type_id: ${var.bronze_node_type_id}
            autotermination_minutes: 30
            autoscale:
              min_workers: 1
              max_workers: 4
            custom_tags:
              layer: bronze
              environment: ${var.environment}

    silver_job:
      name: "${var.environment}-silver-job"
      run_as:
        service_principal_name: ${var.silver_service_principal_application_id}
      email_notifications:
        on_failure:
          - ${var.notification_email}
      tasks:
        - task_key: silver_task
          spark_python_task:
            python_file: ../src/main.py
            parameters:
              - --layer
              - silver
              - --catalog
              - ${var.silver_catalog}
              - --schema
              - ${var.silver_schema}
              - --secret-scope
              - ${var.secret_scope_name}
          new_cluster:
            spark_version: ${var.silver_runtime}
            node_type_id: ${var.silver_node_type_id}
            runtime_engine: PHOTON
            autotermination_minutes: 30
            autoscale:
              min_workers: 1
              max_workers: 4
            custom_tags:
              layer: silver
              environment: ${var.environment}

    gold_job:
      name: "${var.environment}-gold-job"
      run_as:
        service_principal_name: ${var.gold_service_principal_application_id}
      email_notifications:
        on_failure:
          - ${var.notification_email}
      tasks:
        - task_key: gold_task
          spark_python_task:
            python_file: ../src/main.py
            parameters:
              - --layer
              - gold
              - --catalog
              - ${var.gold_catalog}
              - --schema
              - ${var.gold_schema}
              - --secret-scope
              - ${var.secret_scope_name}
          new_cluster:
            spark_version: ${var.gold_runtime}
            node_type_id: ${var.gold_node_type_id}
            autotermination_minutes: 30
            autoscale:
              min_workers: 1
              max_workers: 4
            custom_tags:
              layer: gold
              environment: ${var.environment}

    orchestrator_job:
      name: "${var.environment}-medallion-orchestrator"
      email_notifications:
        on_failure:
          - ${var.notification_email}
      schedule:
        quartz_cron_expression: ${var.job_schedule_quartz}
        timezone_id: ${var.job_schedule_timezone}
        pause_status: UNPAUSED
      tasks:
        - task_key: run_bronze
          run_job_task:
            job_id: ${resources.jobs.bronze_job.id}

        - task_key: run_silver
          depends_on:
            - task_key: run_bronze
          run_job_task:
            job_id: ${resources.jobs.silver_job.id}

        - task_key: run_gold
          depends_on:
            - task_key: run_silver
          run_job_task:
            job_id: ${resources.jobs.gold_job.id}
