resources:
  jobs:
    bronze_job:
      name: job-blg-brz-${var.environment}
      run_as:
        service_principal_name: ${var.bronze_sp_client_id}
      schedule:
        quartz_cron_expression: ${var.bronze_job_cron}
        timezone_id: UTC
      email_notifications:
        on_failure:
          - ${var.bronze_alert_email}
      tasks:
        - task_key: bronze
          spark_python_task:
            python_file: ./src/bronze/main.py
            parameters:
              - --catalog
              - ${var.bronze_catalog}
              - --schema
              - ${var.bronze_schema}
              - --secret-scope
              - ${var.secret_scope}

    silver_job:
      name: job-blg-slv-${var.environment}
      run_as:
        service_principal_name: ${var.silver_sp_client_id}
      schedule:
        quartz_cron_expression: ${var.silver_job_cron}
        timezone_id: UTC
      email_notifications:
        on_failure:
          - ${var.silver_alert_email}
      tasks:
        - task_key: silver
          spark_python_task:
            python_file: ./src/silver/main.py
            parameters:
              - --bronze-catalog
              - ${var.bronze_catalog}
              - --bronze-schema
              - ${var.bronze_schema}
              - --silver-catalog
              - ${var.silver_catalog}
              - --silver-schema
              - ${var.silver_schema}

    gold_job:
      name: job-blg-gld-${var.environment}
      run_as:
        service_principal_name: ${var.gold_sp_client_id}
      schedule:
        quartz_cron_expression: ${var.gold_job_cron}
        timezone_id: UTC
      email_notifications:
        on_failure:
          - ${var.gold_alert_email}
      tasks:
        - task_key: gold
          spark_python_task:
            python_file: ./src/gold/main.py
            parameters:
              - --silver-catalog
              - ${var.silver_catalog}
              - --silver-schema
              - ${var.silver_schema}
              - --gold-catalog
              - ${var.gold_catalog}
              - --gold-schema
              - ${var.gold_schema}

    orchestrator_job:
      name: job-blg-orch-${var.environment}
      schedule:
        quartz_cron_expression: ${var.orchestrator_job_cron}
        timezone_id: UTC
      email_notifications:
        on_failure:
          - ${var.orchestrator_alert_email}
      tasks:
        - task_key: run_bronze
          run_job_task:
            job_id: ${resources.jobs.bronze_job.id}
        - task_key: run_silver
          depends_on:
            - task_key: run_bronze
          run_job_task:
            job_id: ${resources.jobs.silver_job.id}
        - task_key: run_gold
          depends_on:
            - task_key: run_silver
          run_job_task:
            job_id: ${resources.jobs.gold_job.id}
