resources:
  jobs:
    bronze_ingest:
      name: blg-bronze-ingest
      description: "Ingest raw data from JDBC source to Bronze layer"
      tasks:
        - task_key: bronze_ingest_task
          notebook_task:
            notebook_path: ../src/bronze/main
            base_parameters:
              catalog: "{{var.bronze_catalog}}"
              schema: "{{var.bronze_schema}}"
              source_table: "{{var.source_table_name}}"
              secret_scope: "{{var.secret_scope}}"
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "Standard_D4s_v3"
            num_workers: 1
            spark_conf:
              "spark.databricks.cluster.profile": "singleNode"
              "spark.databricks.sqlanalytics.clusters.multiplex.enabled": "true"
              "bronze_sp_client_id": "{{var.bronze_sp_client_id}}"
          timeout_seconds: 3600
      permissions:
        - level: CAN_VIEW
          group_name: "account users"

    silver_transform:
      name: blg-silver-transform
      description: "Transform Bronze data to Silver layer (dedup, filter nulls)"
      tasks:
        - task_key: silver_transform_task
          notebook_task:
            notebook_path: ../src/silver/main
            base_parameters:
              source_catalog: "{{var.bronze_catalog}}"
              source_schema: "{{var.bronze_schema}}"
              target_catalog: "{{var.silver_catalog}}"
              target_schema: "{{var.silver_schema}}"
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "Standard_D4s_v3"
            num_workers: 1
            spark_conf:
              "spark.databricks.cluster.profile": "singleNode"
              "spark.databricks.sqlanalytics.clusters.multiplex.enabled": "true"
              "silver_sp_client_id": "{{var.silver_sp_client_id}}"
          timeout_seconds: 3600
      permissions:
        - level: CAN_VIEW
          group_name: "account users"

    gold_aggregate:
      name: blg-gold-aggregate
      description: "Aggregate Silver data to Gold layer (GROUP BY, SUM metrics)"
      tasks:
        - task_key: gold_aggregate_task
          notebook_task:
            notebook_path: ../src/gold/main
            base_parameters:
              source_catalog: "{{var.silver_catalog}}"
              source_schema: "{{var.silver_schema}}"
              target_catalog: "{{var.gold_catalog}}"
              target_schema: "{{var.gold_schema}}"
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "Standard_D4s_v3"
            num_workers: 1
            spark_conf:
              "spark.databricks.cluster.profile": "singleNode"
              "spark.databricks.sqlanalytics.clusters.multiplex.enabled": "true"
              "gold_sp_client_id": "{{var.gold_sp_client_id}}"
          timeout_seconds: 3600
      permissions:
        - level: CAN_VIEW
          group_name: "account users"

    orchestrator:
      name: blg-orchestrator
      description: "Orchestrate medallion pipeline (Bronze → Silver → Gold)"
      tasks:
        - task_key: bronze_ingest_task
          run_job_task:
            job_id: "{{resources.jobs.bronze_ingest.id}}"

        - task_key: silver_transform_task
          run_job_task:
            job_id: "{{resources.jobs.silver_transform.id}}"
          depends_on:
            - task_key: bronze_ingest_task

        - task_key: gold_aggregate_task
          run_job_task:
            job_id: "{{resources.jobs.gold_aggregate.id}}"
          depends_on:
            - task_key: silver_transform_task

        - task_key: checkpoint_task
          notebook_task:
            notebook_path: ../src/orchestrator/main
            base_parameters:
              target_catalog: "{{var.gold_catalog}}"
              target_schema: "{{var.gold_schema}}"
              alert_email: "{{var.alert_email}}"
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "Standard_D4s_v3"
            num_workers: 1
            spark_conf:
              "spark.databricks.cluster.profile": "singleNode"
              "spark.databricks.sqlanalytics.clusters.multiplex.enabled": "true"
          timeout_seconds: 900
          depends_on:
            - task_key: gold_aggregate_task

      # Optional: Uncomment to schedule daily at 8 AM UTC
      # schedule:
      #   quartz_cron_expression: "0 0 8 ? * MON-FRI *"
      #   timezone_id: "UTC"
      #   pause_status: "UNPAUSED"

      permissions:
        - level: CAN_VIEW
          group_name: "account users"
      
      # Optional: Email on failure
      # email_notifications:
      #   on_failure:
      #     - {{var.alert_email}}
