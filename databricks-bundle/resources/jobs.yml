resources:
  jobs:
    bronze_job:
      name: job-${var.workload}-brz-${var.environment}
      run_as:
        service_principal_name: ${var.bronze_sp_application_id}
      job_clusters:
        - job_cluster_key: bronze_cluster
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 1
            data_security_mode: USER_ISOLATION
      tasks:
        - task_key: bronze_ingest
          job_cluster_key: bronze_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/bronze/main.py
            parameters:
              - --catalog
              - ${var.bronze_catalog}
              - --schema
              - ${var.bronze_schema}
              - --target-table
              - ${var.bronze_table_name}
              - --source-table
              - ${var.source_table_name}
              - --secret-scope
              - ${var.secret_scope}

    silver_job:
      name: job-${var.workload}-slv-${var.environment}
      run_as:
        service_principal_name: ${var.silver_sp_application_id}
      job_clusters:
        - job_cluster_key: silver_cluster
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 1
            data_security_mode: USER_ISOLATION
      tasks:
        - task_key: silver_transform
          job_cluster_key: silver_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/silver/main.py
            parameters:
              - --source-catalog
              - ${var.bronze_catalog}
              - --source-schema
              - ${var.bronze_schema}
              - --source-table
              - ${var.bronze_table_name}
              - --target-catalog
              - ${var.silver_catalog}
              - --target-schema
              - ${var.silver_schema}
              - --target-table
              - ${var.silver_table_name}

    gold_job:
      name: job-${var.workload}-gld-${var.environment}
      run_as:
        service_principal_name: ${var.gold_sp_application_id}
      job_clusters:
        - job_cluster_key: gold_cluster
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 1
            data_security_mode: USER_ISOLATION
      tasks:
        - task_key: gold_publish
          job_cluster_key: gold_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/gold/main.py
            parameters:
              - --source-catalog
              - ${var.silver_catalog}
              - --source-schema
              - ${var.silver_schema}
              - --source-table
              - ${var.silver_table_name}
              - --target-catalog
              - ${var.gold_catalog}
              - --target-schema
              - ${var.gold_schema}
              - --target-table
              - ${var.gold_table_name}

    orchestrator_job:
      name: job-${var.workload}-orch-${var.environment}
      run_as:
        service_principal_name: ${var.gold_sp_application_id}
      tasks:
        - task_key: run_bronze
          run_job_task:
            job_id: ${resources.jobs.bronze_job.id}

        - task_key: run_silver
          depends_on:
            - task_key: run_bronze
          run_job_task:
            job_id: ${resources.jobs.silver_job.id}

        - task_key: run_gold
          depends_on:
            - task_key: run_silver
          run_job_task:
            job_id: ${resources.jobs.gold_job.id}

        - task_key: layer_checkpoint
          depends_on:
            - task_key: run_gold
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 1
            data_security_mode: USER_ISOLATION
          spark_python_task:
            python_file: ${workspace.file_path}/src/orchestrator/main.py
            parameters:
              - --bronze-table
              - ${var.bronze_catalog}.${var.bronze_schema}.${var.bronze_table_name}
              - --silver-table
              - ${var.silver_catalog}.${var.silver_schema}.${var.silver_table_name}
              - --gold-table
              - ${var.gold_catalog}.${var.gold_schema}.${var.gold_table_name}